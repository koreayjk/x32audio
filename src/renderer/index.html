<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>X32 교회 음향</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 상단: 연결 -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">🎛️</span>
      <div>
        <h1>X32 교회 음향</h1>
        <p class="sub">Behringer X32 자동화 · Phase 1</p>
      </div>
    </div>

    <div class="conn">
      <label class="field">
        <span>X32 IP 주소</span>
        <input id="ip" type="text" placeholder="192.168.0.10" value="192.168.0.10" />
      </label>
      <label class="field small">
        <span>포트</span>
        <input id="port" type="number" value="10023" />
      </label>
      <button id="connectBtn" class="btn primary">연결</button>
      <div id="statusBadge" class="badge off">
        <span class="dot"></span><span id="statusText">연결 안 됨</span>
      </div>
    </div>
  </header>

  <div id="info" class="info-strip hidden"></div>

  <main class="grid">
    <!-- 채널 상태 -->
    <section class="card channels">
      <div class="card-head">
        <h2>채널 상태</h2>
        <div class="head-actions">
          <label class="inline">
            채널 수
            <select id="chCount">
              <option value="8">8</option>
              <option value="16" selected>16</option>
              <option value="32">32</option>
            </select>
          </label>
          <button id="refreshBtn" class="btn" disabled>상태 읽기</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="chTable">
          <thead>
            <tr>
              <th>CH</th><th>이름</th><th>레벨</th><th>상태</th><th>EQ</th><th></th>
            </tr>
          </thead>
          <tbody id="chBody">
            <tr class="empty"><td colspan="6">연결 후 <b>상태 읽기</b>를 눌러 채널을 불러오세요.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- 우측 컬럼 -->
    <div class="side">
      <!-- 피드백 감지 -->
      <section class="card feedback">
        <div class="card-head">
          <h2>피드백 감지</h2>
          <button id="feedbackBtn" class="btn" disabled>감지 시작</button>
        </div>
        <div class="fb-controls">
          <label class="inline">
            민감도
            <input id="sensitivity" type="range" min="1" max="10" value="5" />
          </label>
          <span id="fbState" class="muted">중지됨</span>
        </div>
        <div id="spectrum" class="spectrum" aria-hidden="true"></div>
        <ul id="alertList" class="alerts">
          <li class="muted empty">감지된 피드백이 없습니다.</li>
        </ul>
      </section>

      <!-- Scene 템플릿 -->
      <section class="card scenes">
        <div class="card-head">
          <h2>Scene 템플릿</h2>
        </div>
        <div id="sceneList" class="scene-list"></div>
      </section>
    </div>
  </main>

  <!-- EQ 상세 모달 -->
  <div id="eqModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="eqTitle">EQ 상세</h3>
        <button id="eqClose" class="btn ghost">닫기</button>
      </div>
      <div id="eqBody" class="eq-body"></div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
